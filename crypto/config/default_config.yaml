# ============================================================
# Crypto Automated Trading System — Default Configuration
# ============================================================

system:
  mode: paper  # paper | live
  log_level: INFO
  data_dir: ./crypto_data
  quote_currency: USDT

# --- Capital & Account ---
account:
  initial_capital: 1000.0  # In quote currency (USDT)
  currency: USDT
  profit_tax_pct: 30.0     # India: 30% flat tax on crypto gains

# --- Exchange ---
exchange:
  name: binance  # binance | coinbase | kraken | bybit
  sandbox: true  # Use testnet/sandbox when available
  rate_limit: true
  # Credentials loaded from env vars:
  #   EXCHANGE_API_KEY, EXCHANGE_API_SECRET, EXCHANGE_PASSWORD (if required)

# --- Market Data ---
market_data:
  timeframes:
    - 5m
    - 15m
    - 1h
  history_bars: 200          # Number of historical candles to load
  update_interval_seconds: 10  # Main loop interval

# --- Trading Pair Selection ---
selection:
  candidate_pairs:
    - BTC/USDT
    - ETH/USDT
    - BNB/USDT
    - SOL/USDT
    - XRP/USDT
    - ADA/USDT
    - DOGE/USDT
    - AVAX/USDT
    - DOT/USDT
    - POL/USDT
    - LINK/USDT
    - UNI/USDT
    - ATOM/USDT
    - LTC/USDT
    - FIL/USDT
    - NEAR/USDT
    - APT/USDT
    - ARB/USDT
    - OP/USDT
    - SUI/USDT
  min_24h_volume_usdt: 10000000  # Min $10M daily volume
  max_spread_pct: 0.15           # Max 0.15% bid-ask spread
  max_active_pairs: 10           # Max pairs to trade simultaneously
  refresh_interval_hours: 4      # Re-evaluate pairs every 4 hours

# --- Strategy Engine ---
strategies:
  enabled:
    - trend_following
    - mean_reversion
    - breakout_momentum
  default_confidence_threshold: 0.6

# --- Individual Strategy Configs ---
trend_following:
  fast_ema: 9
  slow_ema: 21
  adx_threshold: 30               # Only confirmed trends (was 25)
  atr_multiplier_stop: 2.5         # Wider stops — fewer premature stop-outs (was 2.0)
  atr_multiplier_target: 4.0       # Let trends run (was 3.0)
  require_htf_alignment: true      # 1h EMA trend must agree with 15m signal

mean_reversion:
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  rsi_oversold: 25                 # Deeper extremes only (was 30)
  rsi_overbought: 75               # Deeper extremes only (was 70)
  atr_multiplier_stop: 1.5
  atr_multiplier_target: 3.0       # Wider targets — let reversion play out (was 2.0)
  volume_confirm_mult: 1.2         # Require 1.2x avg volume for entry

breakout_momentum:
  lookback_period: 20
  volume_multiplier: 1.5           # Slightly easier trigger (was 2.0)
  breakout_buffer_pct: 0.1         # Tighter breakout zone (was 0.2)
  atr_multiplier_stop: 2.0
  atr_multiplier_target: 3.0

# --- AI Analysis ---
ai_analysis:
  enabled: true
  min_confidence_boost: 0.05
  max_confidence_boost: 0.25
  lookback_candles: 50

# --- Market Regime ---
regime_detection:
  enabled: true
  adx_trending_threshold: 25
  volatility_high_percentile: 80
  volatility_low_percentile: 20
  lookback_period: 20

# --- Risk Management ---
risk:
  max_risk_per_trade_pct: 1.0
  max_open_positions: 5
  max_rolling_loss_pct: 5.0      # Pause if rolling 24h loss > 5%
  max_total_exposure_pct: 50.0
  max_single_pair_exposure_pct: 20.0
  min_risk_reward_ratio: 1.5
  rolling_window_hours: 24

# --- Position Sizing ---
position_sizing:
  method: volatility_adjusted  # fixed | volatility_adjusted
  fixed_quantity: 0.001        # BTC equivalent default
  volatility_lookback: 14
  max_position_pct: 15.0

# --- Drawdown Protection ---
drawdown:
  warning_threshold_pct: 3.0
  reduce_size_threshold_pct: 5.0
  pause_trading_threshold_pct: 8.0
  size_reduction_factor: 0.5

# --- Volatility Protection ---
volatility_protection:
  enabled: true
  max_price_move_pct: 5.0       # Pause if any active pair moves > 5% in window
  detection_window_minutes: 15
  cooldown_minutes: 30

# --- Liquidity Protection ---
liquidity_protection:
  enabled: true
  min_orderbook_depth_usdt: 50000  # Minimum depth on each side
  max_slippage_pct: 0.3

# --- Paper Trading ---
paper_trading:
  slippage_pct: 0.05
  maker_fee_pct: 0.1
  taker_fee_pct: 0.1

# --- Scheduler ---
scheduler:
  main_loop_interval_seconds: 10
  pair_refresh_interval_hours: 4
  report_interval_hours: 24
  risk_reset_interval_hours: 24
  heartbeat_interval_cycles: 30    # ~5 min at 10s interval
  min_hold_seconds: 120            # Don't exit (except stop-loss) within 2 min of open
  min_expected_profit_pct: 0.5     # Reject signals with <0.5% expected profit

# --- Reporting ---
reporting:
  enabled: true
  report_dir: ./crypto_reports
  format: json

# --- Status API ---
api:
  enabled: false         # Set to true to enable the monitoring API
  host: "0.0.0.0"
  port: 8599

# --- Alerts ---
alerts:
  enabled: true
  channels:
    - console
  alert_on_trade: true
  alert_on_risk_breach: true
  alert_on_error: true
  alert_on_connection_loss: true
