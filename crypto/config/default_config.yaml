# ============================================================
# Crypto Automated Trading System — Default Configuration
# ============================================================

system:
  mode: paper  # paper | live
  log_level: INFO
  data_dir: ./crypto_data
  quote_currency: USDT

# --- Capital & Account ---
account:
  initial_capital: 1000.0  # In quote currency (USDT)
  currency: USDT
  profit_tax_pct: 30.0     # India: 30% flat tax on crypto gains

# --- Exchange ---
exchange:
  name: binance  # binance | coinbase | kraken | bybit
  sandbox: true  # Use testnet/sandbox when available
  rate_limit: true
  # Credentials loaded from env vars:
  #   EXCHANGE_API_KEY, EXCHANGE_API_SECRET, EXCHANGE_PASSWORD (if required)

# --- Market Data ---
market_data:
  timeframes:
    - 5m
    - 15m
    - 1h
  history_bars: 200          # Number of historical candles to load
  update_interval_seconds: 10  # Main loop interval

# --- Trading Pair Selection ---
selection:
  candidate_pairs:
    # Large caps
    - BTC/USDT
    - ETH/USDT
    - BNB/USDT
    - SOL/USDT
    - XRP/USDT
    - ADA/USDT
    - DOGE/USDT
    - AVAX/USDT
    - DOT/USDT
    - LINK/USDT
    - LTC/USDT
    # Mid caps
    - POL/USDT
    - UNI/USDT
    - ATOM/USDT
    - FIL/USDT
    - NEAR/USDT
    - APT/USDT
    - ARB/USDT
    - OP/USDT
    - SUI/USDT
    - TRX/USDT
    - HBAR/USDT
    - INJ/USDT
    - RENDER/USDT
    - FET/USDT
    - IMX/USDT
    - SEI/USDT
    - WIF/USDT
    - PEPE/USDT
    - SHIB/USDT
    - BONK/USDT
    # Volatile / trending
    - AAVE/USDT
    - MKR/USDT
    - RUNE/USDT
    - TIA/USDT
    - JUP/USDT
  min_24h_volume_usdt: 10000000  # Min $10M daily volume
  max_spread_pct: 0.15           # Max 0.15% bid-ask spread
  max_active_pairs: 10           # Max pairs to trade simultaneously
  refresh_interval_hours: 4      # Re-evaluate pairs every 4 hours

# --- Strategy Engine ---
strategies:
  enabled:
    - trend_following
    - mean_reversion
    - breakout_momentum
  default_confidence_threshold: 0.65   # Higher quality signals only (was 0.55)
  sell_confidence_threshold: 0.75      # Higher bar for shorts (was 0.65)
  # Signal burst limiter — prevents correlated batch entries
  signal_burst_window_seconds: 600      # 10 min rolling window
  max_signals_per_window: 3             # Reduced from 5 — fewer correlated entries
  per_symbol_cooldown_seconds: 1200     # 20 min between signals for same symbol (was 15 min)
  # BTC market direction filter (symmetric):
  #   BTC bearish -> block BUY  (don't buy into a downtrend)
  #   BTC bullish -> block SELL (don't short into an uptrend)
  btc_trend_filter_enabled: true
  btc_trend_symbol: "BTC/USDT"
  btc_trend_timeframe: "1h"
  max_same_direction_positions: 2  # Reduced from 3 — less correlated risk

# --- Individual Strategy Configs ---
trend_following:
  fast_ema: 9
  slow_ema: 21
  adx_threshold: 25               # was 30 — more signals in moderate trends
  atr_multiplier_stop: 3.5         # Wider stops — avoid noise stop-outs (was 2.5)
  atr_multiplier_target: 6.0       # Let trends run — need bigger winners to cover tax (was 4.0)
  require_htf_alignment: true      # 1h EMA trend must agree with 15m signal
  # volume_confirm_mult removed — was blocking valid crossovers in low-vol
  trailing_stop_atr_multiplier: 2.5  # Wider trailing (was 2.0)
  max_hold_minutes: 480            # 8 hours max (was 6h — let trends develop)

mean_reversion:
  bb_period: 20
  bb_std: 2.0
  rsi_period: 14
  rsi_oversold: 30                 # was 25 — widens signal window
  rsi_overbought: 70               # was 75 — widens signal window
  atr_multiplier_stop: 2.0         # Wider stops — avoid noise (was 1.5)
  atr_multiplier_target: 4.0       # Bigger targets — need to cover tax (was 3.0)
  # volume_confirm_mult removed — was blocking strategy entirely in low-vol
  min_exit_profit_pct: 0.5         # Exit faster when thesis is wrong (was 1.0%)
  trend_filter_enabled: true       # Skip BUY in downtrend, SELL in uptrend (EMA9 vs EMA21)
  rsi_capitulation_floor: 15       # Skip entry if RSI < 15 (free-fall)
  rsi_capitulation_ceiling: 85     # Skip entry if RSI > 85 (vertical pump)
  trailing_stop_atr_multiplier: 2.0  # Wider trailing (was 1.5)
  max_hold_minutes: 180            # 3 hours max (was 2h — more time to work)

breakout_momentum:
  lookback_period: 20
  volume_multiplier: 2.0           # Higher volume confirmation — fewer false breakouts (was 1.5)
  breakout_buffer_pct: 0.15        # Slightly wider buffer (was 0.1)
  atr_multiplier_stop: 3.0         # Wider stops — avoid noise (was 2.0)
  atr_multiplier_target: 5.0       # Bigger targets — need to cover tax (was 3.0)
  volume_decay_threshold: 0.5      # Exit if volume < 50% avg for N candles
  volume_decay_candles: 3          # Number of consecutive low-volume candles to trigger exit
  trailing_stop_atr_multiplier: 2.5  # Wider trailing (was 1.5)
  max_hold_minutes: 600            # 10 hours max (was 8h — more time for momentum)

# --- Macro AI Analyst ---
# Runs every `refresh_minutes` to scan news + Fear&Greed and produce a MacroContext.
# Requires `ai_analysis.llm_enabled: true` and LLM_API_KEY for full LLM analysis;
# falls back to keyword-based mood scoring if LLM is unavailable.
macro_analyst:
  enabled: true
  refresh_minutes: 30          # How often to fetch news and re-analyze
  max_ai_pairs: 3              # Max extra pairs AI can inject into watchlist per cycle
  apply_mood_filter: true      # Block ALL BUY signals when mood=risk_off (conf >= 0.70)
  apply_pair_bias: true        # Block signals that conflict with AI directional bias
  # NEWS_API_KEY env var enables authenticated CryptoPanic (optional — public works too)

# --- AI Analysis ---
ai_analysis:
  enabled: true
  min_confidence_boost: 0.05
  max_confidence_boost: 0.25
  lookback_candles: 50
  # LLM integration (opt-in: requires LLM_API_KEY env var)
  llm_enabled: false
  llm_provider: gemini              # gemini | openai
  llm_cache_minutes: 15             # Cache LLM results per symbol
  # News sentiment (opt-in: CryptoPanic API, requires NEWS_API_KEY env var)
  news_enabled: false
  news_refresh_minutes: 30          # Re-fetch headlines every 30 min
  # Factor weights (must sum to 1.0 when all active)
  factor_weights:
    technical: 0.6
    llm: 0.25
    news: 0.15

# --- Market Regime ---
regime_detection:
  enabled: true
  adx_trending_threshold: 25
  volatility_high_percentile: 80
  volatility_low_percentile: 20
  lookback_period: 20

# --- Risk Management ---
risk:
  max_risk_per_trade_pct: 1.0
  max_open_positions: 5
  max_rolling_loss_pct: 5.0      # Pause if rolling 24h loss > 5%
  max_total_exposure_pct: 50.0
  max_single_pair_exposure_pct: 20.0
  min_risk_reward_ratio: 1.5
  rolling_window_hours: 24

# --- Position Sizing ---
position_sizing:
  method: volatility_adjusted  # fixed | volatility_adjusted
  fixed_quantity: 0.001        # BTC equivalent default
  volatility_lookback: 14
  max_position_pct: 20.0       # Increased from 15% — larger positions, less fee drag
  min_position_pct: 10.0       # NEW: Ensure meaningful position sizes

# --- Drawdown Protection ---
drawdown:
  warning_threshold_pct: 3.0
  reduce_size_threshold_pct: 5.0
  pause_trading_threshold_pct: 8.0
  size_reduction_factor: 0.5

# --- Volatility Protection ---
volatility_protection:
  enabled: true
  max_price_move_pct: 5.0       # Pause if any active pair moves > 5% in window
  detection_window_minutes: 15
  cooldown_minutes: 30

# --- Liquidity Protection ---
liquidity_protection:
  enabled: true
  min_orderbook_depth_usdt: 50000  # Minimum depth on each side
  max_slippage_pct: 0.3

# --- Paper Trading ---
paper_trading:
  slippage_pct: 0.05
  maker_fee_pct: 0.1
  taker_fee_pct: 0.1

# --- Scheduler ---
scheduler:
  main_loop_interval_seconds: 10
  pair_refresh_interval_hours: 4
  report_interval_hours: 24
  risk_reset_interval_hours: 24
  heartbeat_interval_cycles: 30    # ~5 min at 10s interval
  min_hold_seconds: 120            # Don't exit (except stop-loss) within 2 min of open
  min_expected_profit_pct: 0.3     # was 0.5 — ATR targets too small in low-vol
  max_entries_per_cycle: 2         # Max new positions per cycle (prevents correlated batch entries)

# --- Reporting ---
reporting:
  enabled: true
  report_dir: ./crypto_reports
  format: json

# --- Status API ---
api:
  enabled: false         # Set to true to enable the monitoring API
  host: "0.0.0.0"
  port: 8599

# --- Alerts ---
alerts:
  enabled: true
  channels:
    - console
  alert_on_trade: true
  alert_on_risk_breach: true
  alert_on_error: true
  alert_on_connection_loss: true
