# ============================================================
# Automated AI Trading System — Default Configuration
# ============================================================

system:
  mode: paper  # paper | live
  timezone: Asia/Kolkata
  log_level: INFO
  data_dir: ./data_store
  market: NSE

# --- Capital & Account ---
account:
  initial_capital: 100000.0
  currency: INR
  profit_tax_pct: 15.0     # Short-term capital gains tax on equity profits

# --- Market Hours (IST) ---
schedule:
  pre_market_start: "08:45"
  market_open: "09:15"
  market_close: "15:30"
  pre_close_start: "15:15"
  post_market_end: "16:00"

# --- Market Data ---
market_data:
  provider: yahoo
  timeframes:
    - 1m
    - 5m
    - 15m
  history_days: 30
  update_interval_seconds: 5

# --- Stock Selection ---
selection:
  min_volume: 500000
  min_price: 50.0
  max_price: 10000.0
  max_watchlist_size: 20
  index_symbols:
    - "^NSEI"   # Nifty 50
    - "^NSEBANK"  # Bank Nifty
  # Priority symbols get automatic watchlist inclusion if they pass basic filters.
  # Use this for sectors with strong macro tailwinds (war → oil/gas, etc.)
  priority_symbols:
    - "ONGC.NS"
    - "BPCL.NS"
    - "IOC.NS"
    - "GAIL.NS"
    - "OIL.NS"
    - "PETRONET.NS"
    - "HINDPETRO.NS"
    - "RELIANCE.NS"      # Significant O&G refining segment
    - "VEDL.NS"          # Commodities/oil
    - "COALINDIA.NS"     # Energy sector
  # Sector momentum: boost score for symbols in these sectors
  sector_momentum_boost: 25  # Extra points added to priority symbols' score

# --- Scheduler / Anti-Churn ---
scheduler:
  max_entries_per_cycle: 2           # Max new positions per cycle (prevents correlated batch entries)
  min_expected_profit_pct: 0.5       # Reject signals with <0.5% expected profit (must cover fees)
  min_hold_minutes: 10               # Don't exit (except stop-loss) within 10 min of open
  signal_cooldown_seconds: 300       # 5-min cooldown per symbol after entry/exit

# --- Strategy Engine ---
strategies:
  enabled:
    - mean_reversion
    - momentum_breakout
    - opening_range_breakout
    - vwap_reversion
  default_confidence_threshold: 0.65

# --- Individual Strategy Configs ---
mean_reversion:
  lookback_period: 20
  entry_zscore: -2.2                  # Stricter entry — fewer false signals (was -2.0)
  exit_zscore: 0.0
  stop_zscore: -3.0
  min_exit_profit_pct: 0.5           # Don't exit below 0.5% gross profit (covers fees)
  max_hold_minutes: 90               # Force exit after 90min to prevent bleeding
  require_trend_alignment: true      # Only BUY when higher-TF trend is up/sideways
  require_vwap_below: true           # Only BUY when price is below VWAP
  rsi_capitulation_floor: 20         # Skip entry if RSI < 20 (capitulation)

momentum_breakout:
  lookback_period: 20
  volume_multiplier: 1.5
  breakout_threshold_pct: 1.0
  atr_multiplier_stop: 2.0
  atr_multiplier_target: 4.0         # Wider targets — let breakouts run (was 3.0)
  trailing_stop_atr: 1.5             # Trail stop at highest - 1.5×ATR
  max_hold_minutes: 180              # Max 3h hold for breakout trades
  require_vwap_above: true           # Only enter breakouts above VWAP
  volume_decay_exit_ratio: 0.7       # Exit if volume drops below 0.7× avg

opening_range_breakout:
  opening_range_minutes: 15
  breakout_buffer_pct: 0.2           # Wider buffer — fewer false breakouts (was 0.1)
  atr_multiplier_stop: 1.5
  atr_multiplier_target: 3.0         # Wider target (was 2.5)
  max_window_minutes: 60             # Only fire within 60 min of market open
  volume_confirm: true               # Require above-average volume on breakout candle
  trailing_stop_atr: 1.2             # Tighter trailing stop for ORB
  max_hold_minutes: 150              # Max 2.5h hold
  min_range_atr_ratio: 0.5           # Skip if OR range < 0.5×ATR (too narrow)

vwap_reversion:
  deviation_pct: 1.5                 # Enter when price > 1.5% from VWAP
  exit_at_vwap: true                 # Exit when price returns to VWAP
  require_trend_alignment: true      # Higher-TF trend must support direction
  volume_multiplier: 1.2             # Require above-avg volume at entry
  max_hold_minutes: 60               # Quick reversion trades
  min_target_pct: 0.5                # Target must be > 0.5% to cover fees

# --- Macro AI Analyst ---
# Runs at pre-market + every refresh_minutes during market hours.
# Reads Indian business news (Economic Times, Moneycontrol, Google News India)
# and classifies macro mood for NSE equities.
# Requires ai_analysis.llm_enabled: true + LLM_API_KEY for full LLM analysis;
# falls back to keyword scoring otherwise.
macro_analyst:
  enabled: true
  asset_type: stock_nse          # Uses Indian news sources + NSE-specific LLM prompt
  refresh_minutes: 30            # Re-analyze every 30 min (also runs at pre-market)
  max_ai_pairs: 5                # Max symbols AI can add to priority list per session
  apply_mood_filter: true        # Block BUY signals in strong risk_off environment
  apply_pair_bias: true          # Block signals conflicting with AI directional bias
  # NEWS_API_KEY env var enables authenticated CryptoPanic (not needed for stocks)

# --- AI Analysis ---
ai_analysis:
  enabled: true
  min_confidence_boost: 0.1
  max_confidence_boost: 0.3
  lookback_candles: 50
  # LLM integration (opt-in: requires LLM_API_KEY env var)
  llm_enabled: false
  llm_provider: gemini              # gemini | openai
  llm_cache_minutes: 15             # Cache LLM results per symbol
  # News sentiment (opt-in)
  news_enabled: false
  news_refresh_minutes: 30          # Re-fetch headlines every 30 min
  # Factor weights (must sum to 1.0 when all active)
  factor_weights:
    technical: 0.6
    llm: 0.25
    news: 0.15

# --- Market Regime ---
regime_detection:
  enabled: true
  adx_trending_threshold: 25
  volatility_high_percentile: 80
  volatility_low_percentile: 20
  lookback_period: 20

# --- Risk Management ---
risk:
  max_risk_per_trade_pct: 1.0       # Max 1% of capital per trade
  max_open_positions: 4             # Balanced: 4 positions (was 3)
  max_daily_loss_pct: 3.0           # Stop trading if daily loss exceeds 3%
  max_total_exposure_pct: 70.0      # Max 70% of capital deployed (4 × ~18%)
  max_single_stock_exposure_pct: 22.0  # Larger positions allowed
  min_risk_reward_ratio: 1.5

# --- Position Sizing ---
position_sizing:
  method: volatility_adjusted  # fixed | volatility_adjusted | kelly
  fixed_quantity: 10
  volatility_lookback: 14
  max_position_pct: 20.0  # Larger positions = lower fee impact (was 10%)

# --- Drawdown Protection ---
drawdown:
  warning_threshold_pct: 2.0
  reduce_size_threshold_pct: 3.0
  pause_trading_threshold_pct: 5.0
  size_reduction_factor: 0.5

# --- News & Event Awareness ---
news:
  enabled: false  # Enable when news API is configured
  pause_minutes_before_event: 15
  pause_minutes_after_event: 15

# --- Volatility Safeguards ---
volatility_safeguards:
  enabled: true
  max_intraday_move_pct: 3.0  # Pause if index moves > 3% intraday
  spike_detection_window: 5     # minutes
  spike_threshold_pct: 1.5

# --- Broker (Live Trading) ---
broker:
  adapter: angelone  # zerodha | angelone
  # Credentials are loaded from environment variables:
  #   Angel One: BROKER_API_KEY, BROKER_CLIENT_ID, BROKER_PASSWORD, BROKER_TOTP_SECRET
  #   Zerodha:   BROKER_API_KEY, BROKER_API_SECRET, BROKER_ACCESS_TOKEN

# --- Paper Trading ---
paper_trading:
  slippage_pct: 0.05
  commission_per_trade: 25.0          # Realistic: ₹20 brokerage + ₹3.60 GST + ~₹1.75 STT (was 20)
  fill_delay_seconds: 1

# --- Reporting ---
reporting:
  daily_report: true
  report_dir: ./reports
  format: json  # json | csv

# --- Alerts ---
alerts:
  enabled: true
  channels:
    - console  # console | file | webhook
  alert_on_trade: true
  alert_on_risk_breach: true
  alert_on_error: true
